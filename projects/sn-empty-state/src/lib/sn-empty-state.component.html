<div class="sn-empty-state-wrapper">
    <div class="sn-empty-state-icon" *ngIf="iconClass">
        <i [class]="iconClass"></i>
    </div>

    <!-- Fallback default SVG icon if no custom class is provided -->
    <div class="sn-empty-state-icon" *ngIf="!iconClass">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-gray-400" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
    </div>

    <h3 class="sn-empty-state-title">{{ title }}</h3>
    <p class="sn-empty-state-description">{{ description }}</p>

    <button *ngIf="actionText" class="sn-empty-state-button" (click)="onActionClick()">
        {{ actionText }}
    </button>
</div>
