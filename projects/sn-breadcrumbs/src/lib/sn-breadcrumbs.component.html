<nav aria-label="Breadcrumb">
    <ol role="list" class="sn-breadcrumbs-list">
        @for (item of items; track item.label; let i = $index) {
        <li class="sn-breadcrumbs-item">
            <div class="flex items-center">

                <!-- Separator SVG (hidden for first item) -->
                @if (i > 0) {
                <svg class="sn-breadcrumbs-separator" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"
                    data-slot="icon">
                    <path fill-rule="evenodd"
                        d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd" />
                </svg>
                }

                <a [href]="item.path || 'javascript:void(0)'" class="sn-breadcrumbs-link" [ngClass]="{
              'sn-breadcrumbs-link-disabled': item.disabled,
              'sn-breadcrumbs-link-active': i === items.length - 1
            }" [attr.aria-current]="i === items.length - 1 ? 'page' : null" (click)="onItemClick(item, $event)">
                    {{ item.label }}
                </a>
            </div>
        </li>
        }
    </ol>
</nav>
